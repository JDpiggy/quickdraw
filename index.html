<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quickdraw Shooting Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameScreen" class="start">
        <button id="startButton">GO</button>
        <div id="timer"></div>
        <div id="result"></div>
        <div id="highScore"></div>
        <div id="soundIndicator">Listening for sound...</div>
        
        <!-- Volume and Device Controls -->
        <div id="controls">
            <div id="volumeDisplay">Volume: 0.000</div>
            <div id="deviceControls">
                <div class="control-group">
                    <label for="micSelect">Microphone:</label>
                    <select id="micSelect">
                        <option value="">Default</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="speakerSelect">Speaker:</label>
                    <select id="speakerSelect">
                        <option value="">Default</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
